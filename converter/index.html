<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Condition Converter · Toolkino Minoru</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" />
  <link rel="stylesheet" href="../assets/css/app.css" />
  <link rel="stylesheet" href="../assets/css/tools.css" />
</head>
<body class="tool-fit" data-page="converter" data-root="..">
  <div id="sidebar-mount"></div>
  <main class="main main-fit">
    <header class="page-header">
      <h2>Condition Converter</h2>
      <p>Convert raw skill condition codes into readable English using TazunaBot rules.</p>
    </header>
    <section class="split-3">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-dots">
            <span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span>
            <span class="panel-title" style="margin-left:0.5rem;">Condition code</span>
          </div>
          <button class="btn-icon danger" id="clear-btn" title="Clear">
            <span class="material-symbols-outlined">delete_sweep</span>
          </button>
        </div>
        <div class="panel-body">
          <textarea class="editor" id="condition-input" placeholder="phase>=2
&order_rate>=50 (CM >= 5 | LoH >= 6)
&is_finalcorner==1
&bashin_diff_infront<=1"></textarea>
        </div>
      </div>
      <div class="split-actions">
        <button class="btn-round" id="convert-btn" title="Convert">
          <span class="material-symbols-outlined">translate</span>
        </button>
        <div class="format-rail">
          <div class="line"></div>
          <span class="label-caps" style="font-size:11px;">Convert</span>
          <div class="line"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">English output</span>
          <button class="btn-icon" id="copy-btn" title="Copy">
            <span class="material-symbols-outlined">content_copy</span>
          </button>
        </div>
        <div class="panel-body">
          <pre class="output" id="condition-output"><span class="muted">// Awaiting input...</span></pre>
        </div>
      </div>
    </section>
    <div class="tip">
      <div class="tip-icon"><span class="material-symbols-outlined">lightbulb</span></div>
      <div>
        <p class="label-caps" style="color:var(--primary);margin:0 0 0.2rem;">Quick tip</p>
        <p style="margin:0;color:var(--on-surface-variant);font-size:0.95rem;">Paste master DB conditions with <span class="mono">&</span> / newlines. Ctrl+Enter to convert.</p>
      </div>
    </div>
  </main>
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/converter.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => Toolkino.mountShell("converter"));</script>
</body>
</html>
